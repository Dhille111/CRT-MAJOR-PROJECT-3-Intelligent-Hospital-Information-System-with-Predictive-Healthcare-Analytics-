# Render Blueprint Specification for Medlink HMS
# Connect this repository to Render (https://render.com) to deploy both backend and frontend.

services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: healthcare-hms-backend
    env: python
    rootDir: backend
    buildCommand: if [ -d backend ]; then cd backend && pip install -r requirements.txt; else pip install -r requirements.txt; fi
    startCommand: if [ -d backend ]; then cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT; else uvicorn app.main:app --host 0.0.0.0 --port $PORT; fi
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./hospital.db # Ephemeral SQLite for demo. Override with PostgreSQL URL for persistent production.
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: https://healthcare-hms-frontend.onrender.com,http://localhost:5173,* # Replace with your actual frontend Render URL after deployment if different

  # 2. Frontend Static Site (React + Vite)
  - type: static
    name: healthcare-hms-frontend
    rootDir: frontend
    buildCommand: if [ -d frontend ]; then cd frontend && npm install && VITE_API_URL=${BACKEND_URL}/api/v1 npm run build; else npm install && VITE_API_URL=${BACKEND_URL}/api/v1 npm run build; fi
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: healthcare-hms-backend
          property: host
